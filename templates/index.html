<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Approval Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="container">
        <section class="card">
            <h1>Loan Approval Predictor</h1>
            <p class="subtitle">Enter applicant details to estimate loan approval probability.</p>

            {% if prediction is not none %}
                <div class="result {% if prediction.approved %}approved{% else %}declined{% endif %}">
                    <h2>{{ "Approved" if prediction.approved else "Declined" }}</h2>
                    <p>Predicted approval probability: <strong>{{ prediction.probability }}%</strong></p>
                </div>
            {% endif %}

            <form method="post">
                <div class="form-grid">
                    <label>
                        Applicant Income
                        <input type="number" name="ApplicantIncome" min="0" step="0.01" required>
                    </label>

                    <label>
                        Coapplicant Income
                        <input type="number" name="CoapplicantIncome" min="0" step="0.01" value="0">
                    </label>

                    <label>
                        Loan Amount
                        <input type="number" name="LoanAmount" min="0" step="0.01" required>
                    </label>

                    <label>
                        Loan Amount Term
                        <input type="number" name="Loan_Amount_Term" min="0" step="1" value="360">
                    </label>

                    <label>
                        Credit History
                        <select name="Credit_History" required>
                            <option value="1">Good</option>
                            <option value="0">Bad</option>
                        </select>
                    </label>

                    <label>
                        Self Employed
                        <select name="Self_Employed" required>
                            <option value="No">No</option>
                            <option value="Yes">Yes</option>
                        </select>
                    </label>

                    <label>
                        Married
                        <select name="Married" required>
                            <option value="No">No</option>
                            <option value="Yes">Yes</option>
                        </select>
                    </label>

                    <label>
                        Dependents
                        <select name="Dependents" required>
                            <option value="0">0</option>
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3+">3+</option>
                        </select>
                    </label>

                    <label>
                        Education
                        <select name="Education" required>
                            <option value="Graduate">Graduate</option>
                            <option value="Not Graduate">Not Graduate</option>
                        </select>
                    </label>

                    <label>
                        Property Area
                        <select name="Property_Area" required>
                            <option value="Urban">Urban</option>
                            <option value="Semiurban">Semiurban</option>
                            <option value="Rural">Rural</option>
                        </select>
                    </label>
                </div>

                <button type="submit">Predict Approval</button>
            </form>
        </section>
    </main>
</body>
</html>
